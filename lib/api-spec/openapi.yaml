openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: DevDonna Outreach API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: auth
    description: Authentication
  - name: categories
    description: Contact categories
  - name: contacts
    description: Contact management
  - name: campaigns
    description: Email campaigns
  - name: emails
    description: Email tracking
  - name: dashboard
    description: Dashboard statistics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        "200":
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserEnvelope"
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        "302":
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      responses:
        "302":
          description: Redirect to the returnTo path on success or /api/login on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        "302":
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MobileTokenExchangeRequest"
      responses:
        "200":
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MobileTokenExchangeSuccess"
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        "200":
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutSuccess"

  # ─── CATEGORIES ───────────────────────────────────────────────────

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    get:
      operationId: getCategory
      tags: [categories]
      summary: Get a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Not found
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── CONTACTS ─────────────────────────────────────────────────────

  /contacts:
    get:
      operationId: listContacts
      tags: [contacts]
      summary: List contacts with optional filtering
      parameters:
        - name: categoryId
          in: query
          schema:
            type: ["integer", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
            enum: [pending, sent, failed, null]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Paginated contacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactList"
    post:
      operationId: createContact
      tags: [contacts]
      summary: Create a single contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /contacts/bulk-delete:
    post:
      operationId: bulkDeleteContacts
      tags: [contacts]
      summary: Delete multiple contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDeleteInput"
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkDeleteResult"

  /contacts/{id}:
    get:
      operationId: getContact
      tags: [contacts]
      summary: Get a contact with full history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contact with email history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactDetail"
        "404":
          description: Not found
    patch:
      operationId: updateContact
      tags: [contacts]
      summary: Update a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
    delete:
      operationId: deleteContact
      tags: [contacts]
      summary: Delete a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── CAMPAIGNS ────────────────────────────────────────────────────

  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      summary: List all campaigns
      responses:
        "200":
          description: Campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"
    post:
      operationId: createCampaign
      tags: [campaigns]
      summary: Create a campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [campaigns]
      summary: Get campaign with email stats
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignDetail"
        "404":
          description: Not found
    delete:
      operationId: deleteCampaign
      tags: [campaigns]
      summary: Delete a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /campaigns/{id}/send:
    post:
      operationId: sendCampaign
      tags: [campaigns]
      summary: Send campaign emails to all contacts in the selected category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Send result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendResult"

  # ─── EMAILS ───────────────────────────────────────────────────────

  /emails:
    get:
      operationId: listEmails
      tags: [emails]
      summary: List sent emails with optional filtering
      parameters:
        - name: campaignId
          in: query
          schema:
            type: ["integer", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
            enum: [sent, failed, null]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Email records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailList"

  # ─── DASHBOARD ────────────────────────────────────────────────────

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard summary statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: ["string", "null"]
          format: email
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        profileImageUrl:
          type: ["string", "null"]
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: "#/components/schemas/AuthUser"
            - type: "null"
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    # ─── CATEGORIES ─────────────────────────────────────────────────

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: ["string", "null"]
        contactCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, name, contactCount, createdAt]

    CategoryInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        color:
          type: string
      required: [name]

    CategoryUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        color:
          type: ["string", "null"]

    # ─── CONTACTS ───────────────────────────────────────────────────

    Contact:
      type: object
      properties:
        id:
          type: integer
        companyName:
          type: string
        contactName:
          type: ["string", "null"]
        email:
          type: string
        website:
          type: ["string", "null"]
        industry:
          type: ["string", "null"]
        categoryId:
          type: ["integer", "null"]
        categoryName:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, sent, failed]
        createdAt:
          type: string
          format: date-time
      required: [id, companyName, email, status, createdAt]

    ContactInput:
      type: object
      properties:
        companyName:
          type: string
          minLength: 1
        contactName:
          type: string
        email:
          type: string
          format: email
        website:
          type: string
        industry:
          type: string
        categoryId:
          type: integer
        city:
          type: string
        country:
          type: string
        phone:
          type: string
        notes:
          type: string
      required: [companyName, email]

    ContactUpdate:
      type: object
      properties:
        companyName:
          type: string
          minLength: 1
        contactName:
          type: ["string", "null"]
        email:
          type: string
          format: email
        website:
          type: ["string", "null"]
        industry:
          type: ["string", "null"]
        categoryId:
          type: ["integer", "null"]
        city:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    ContactList:
      type: object
      properties:
        contacts:
          type: array
          items:
            $ref: "#/components/schemas/Contact"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [contacts, total, page, limit]

    ContactDetail:
      type: object
      properties:
        contact:
          $ref: "#/components/schemas/Contact"
        emails:
          type: array
          items:
            $ref: "#/components/schemas/EmailRecord"
      required: [contact, emails]

    ImportResult:
      type: object
      properties:
        imported:
          type: integer
        skipped:
          type: integer
        errors:
          type: array
          items:
            type: string
      required: [imported, skipped, errors]

    BulkDeleteInput:
      type: object
      properties:
        ids:
          type: array
          items:
            type: integer
      required: [ids]

    BulkDeleteResult:
      type: object
      properties:
        deleted:
          type: integer
      required: [deleted]

    # ─── CAMPAIGNS ──────────────────────────────────────────────────

    Campaign:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        subject:
          type: string
        body:
          type: string
        categoryId:
          type: integer
        categoryName:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, sending, sent, failed]
        sentCount:
          type: integer
        failedCount:
          type: integer
        totalCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        sentAt:
          type: ["string", "null"]
          format: date-time
      required: [id, name, subject, body, categoryId, status, sentCount, failedCount, totalCount, createdAt]

    CampaignInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        subject:
          type: string
          minLength: 1
        body:
          type: string
          minLength: 1
        categoryId:
          type: integer
      required: [name, subject, body, categoryId]

    CampaignDetail:
      type: object
      properties:
        campaign:
          $ref: "#/components/schemas/Campaign"
        emails:
          type: array
          items:
            $ref: "#/components/schemas/EmailRecord"
      required: [campaign, emails]

    SendResult:
      type: object
      properties:
        sent:
          type: integer
        failed:
          type: integer
        total:
          type: integer
      required: [sent, failed, total]

    # ─── EMAILS ─────────────────────────────────────────────────────

    EmailRecord:
      type: object
      properties:
        id:
          type: integer
        campaignId:
          type: integer
        campaignName:
          type: ["string", "null"]
        contactId:
          type: integer
        contactEmail:
          type: string
        contactCompany:
          type: ["string", "null"]
        status:
          type: string
          enum: [sent, failed]
        errorMessage:
          type: ["string", "null"]
        sentAt:
          type: string
          format: date-time
      required: [id, campaignId, contactId, contactEmail, status, sentAt]

    EmailList:
      type: object
      properties:
        emails:
          type: array
          items:
            $ref: "#/components/schemas/EmailRecord"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required: [emails, total, page, limit]

    # ─── DASHBOARD ──────────────────────────────────────────────────

    DashboardStats:
      type: object
      properties:
        totalContacts:
          type: integer
        pendingContacts:
          type: integer
        totalCategories:
          type: integer
        totalEmailsSent:
          type: integer
        totalEmailsFailed:
          type: integer
        totalCampaigns:
          type: integer
        recentCampaigns:
          type: array
          items:
            $ref: "#/components/schemas/Campaign"
        contactsByCategory:
          type: array
          items:
            $ref: "#/components/schemas/CategoryContactCount"
      required: [totalContacts, pendingContacts, totalCategories, totalEmailsSent, totalEmailsFailed, totalCampaigns, recentCampaigns, contactsByCategory]

    CategoryContactCount:
      type: object
      properties:
        categoryId:
          type: integer
        categoryName:
          type: string
        count:
          type: integer
      required: [categoryId, categoryName, count]
